<div class="card mb-3" *ngIf="products.length > 0; else NoProducts">
    <ng-template [ngTemplateOutlet]="productList1" [ngTemplateOutletContext]="{products : products}"></ng-template>
</div>

<ng-template #productList1 let-products="products">
    <div *ngFor="let product of products" >
        <div *ngIf="product.isActive" class="card mb-3 p-4">
            <div class="row">
                <div class="col-3">
                    <img src="/assets/images/{{ product.image}}" alt="" class="img-fluid rounded-start">
                </div>
                <div class="col-9">
                    <div class="card-body">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="cart-text">{{ product.description }}</p>
                        <a routerLink="/products/{{product.id}}" class="btn btn-primary">Ürün Detay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ng-template>



<ng-template #NoProducts>
    <div class="alert alert-warning">
        <p>No Product</p>
    </div>
</ng-template>
