<div class="card mb-3 p-1 border border-warning" *ngIf="product else NoProduct">
    <div class="row">
        <div class="col-3">
            <img src="/assets/images/{{product.image}}" alt="" class="img-fluid rounded-start">
        </div>
        <div class="col-9">
            <div class="card-body">
                <h5 class="card-title">{{product.name }}</h5>
                <p class="cart-text">{{product.description }}</p>
            </div>
        </div>
    </div>
</div>

<ng-template #NoProduct>
    <div class="alert alert-warning">
        <p>No Product</p>
    </div>
</ng-template>
